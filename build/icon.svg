<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- PlotTracer app icon. A loupe magnifying a faint plot underneath, pinning
       the extracted point (brand teal #167782 on a soft cool-white tile).
       The mark is authored on a 0..64 grid and scaled 6.25x into a 400px box
       with 56px padding. Regenerate the PNG set via scripts/generate-icons.sh. -->
  <rect x="1" y="1" width="510" height="510" rx="113" fill="#f6f9fa" stroke="#e1e8ea" stroke-width="2"/>
  <g transform="translate(56,56) scale(6.25)" stroke-linecap="round">
    <!-- faint full plot, underneath, edge to edge -->
    <path d="M5 48 C 19 46 30 31 59 15" fill="none" stroke="#a7b8bc" stroke-width="2.3"/>
    <!-- lens glass masks the faint curve inside the loupe -->
    <circle cx="26" cy="27" r="15" fill="#ffffff"/>
    <!-- magnified slice of the same curve -->
    <path d="M16 35 C 21 33 24 21 36 18.5" fill="none" stroke="#167782" stroke-width="3.5"/>
    <!-- the extracted point -->
    <circle cx="26.3" cy="25.2" r="3.9" fill="#ffffff" stroke="#167782" stroke-width="2.5"/>
    <!-- lens ring + handle -->
    <circle cx="26" cy="27" r="17" fill="none" stroke="#167782" stroke-width="4.2"/>
    <line x1="40" y1="41" x2="54" y2="55" stroke="#167782" stroke-width="5.4"/>
  </g>
</svg>
